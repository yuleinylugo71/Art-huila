<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="recoverPassword.title">Recuperar contraseña — Art Huila</title>
  <link rel="stylesheet" href="/css/base.css?v=13">
  <link rel="stylesheet" href="/css/verificar-email.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="background-color: #faf8f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 1.25rem; font-family: var(--font-body);">

<nav style="position: absolute; top: 1.5rem; right: 2rem; z-index: 10;">
  <div class="lang-switcher">
    <button id="btn-lang-es" onclick="window.changeLanguage('es')">ES</button>
    <span>|</span>
    <button id="btn-lang-en" onclick="window.changeLanguage('en')">EN</button>
  </div>
</nav>

<div class="verify-container" style="background: white; border: 1.5px solid #ebdcd0; border-radius: 24px; padding: 2.5rem 2rem; text-align: center; max-width: 420px; width: 100%; box-shadow: var(--shadow-md); box-sizing: border-box;">
  <div class="verify-icon" style="font-size: 3rem; color: #C84B11; margin-bottom: 1.25rem;">
    <i class="fa-solid fa-key"></i>
  </div>
  
  <h1 class="verify-title" style="font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; color: #261f1b; margin: 0 0 0.5rem 0;" data-i18n="recoverPassword.heading">Recuperar contraseña</h1>
  
  <p class="verify-text" style="color: var(--color-muted); font-size: 0.85rem; line-height: 1.45; margin: 0 0 1.5rem 0;" data-i18n="recoverPassword.desc">
    Ingresa tu correo electrónico registrado y te enviaremos un enlace para restablecer tu contraseña.
  </p>
  
  <form id="recover-form" style="text-align: left; margin-bottom: 1.25rem;">
    <div class="form-group" style="margin-bottom: 1.25rem;">
      <label for="email" style="display: block; font-size: 0.8rem; font-weight: 600; color: #4a3e35; margin-bottom: 0.5rem;" data-i18n="recoverPassword.emailLabel">Correo electrónico</label>
      <input type="email" id="email" required placeholder="tu@correo.com" data-i18n-placeholder="recoverPassword.emailPlaceholder" style="width: 100%; padding: 0.8rem 1rem; border: 1.5px solid #ebdcd0; border-radius: 12px; background: #faf8f5; color: #261f1b; font-size: 0.9rem; outline: none; transition: all 0.2s; box-sizing: border-box;" autocomplete="email"/>
    </div>
    
    <button type="submit" id="btn-submit" class="btn btn-primary" style="width: 100%; border-radius: 99px; padding: 0.85rem; font-weight: 700; font-size: 0.9rem; background: #C84B11; border: none; color: white; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(200,75,17,0.2);">
      <span data-i18n="recoverPassword.btnText">Enviar enlace de recuperación</span>
    </button>
  </form>

  <div id="status-message" style="margin-bottom: 1.25rem;"></div>

  <div style="display: flex; justify-content: center; margin-top: 1rem;">
    <a href="/login.html" class="btn btn-outline" style="border: 1.5px solid #ebdcd0; border-radius: 99px; padding: 0.65rem 1.5rem; font-size: 0.8rem; font-weight: 700; color: #4a3e35; display: inline-block; width: fit-content; text-decoration: none;" data-i18n="recoverPassword.backToLogin">Volver al inicio de sesión</a>
  </div>
</div>

<script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
<script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js"></script>
<script src="https://unpkg.com/i18next-browser-languagedetector/i18nextBrowserLanguageDetector.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/recuperar-contrasena.js"></script>
</body>
</html>
