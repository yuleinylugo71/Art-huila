<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verificar Email — Art Huila</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--color-bg);">
<div style="text-align:center;max-width:480px;padding:2rem;">
  <div style="font-size:4rem;margin-bottom:1rem;">📧</div>
  <h1 style="font-family:'Crimson Pro',serif;font-size:2.2rem;color:var(--color-text);margin-bottom:0.75rem;">Revisa tu correo</h1>
  <p style="color:var(--color-muted);margin-bottom:2rem;line-height:1.7;">Hemos enviado un enlace de verificación a tu correo electrónico. Haz clic en él para activar tu cuenta. El enlace expira en <strong>48 horas</strong>.</p>
  <div id="verify-status"></div>
  <a href="/login.html" class="btn btn-outline">Ir al inicio de sesión</a>
</div>
<script src="/js/api.js"></script>
<script>
  // Auto-verify if token in URL
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (token) {
    const el = document.getElementById('verify-status');
    el.innerHTML = '<div class="spinner"></div>';
    apiFetch('/auth/verificar-email?token=' + token).then(data => {
      el.innerHTML = '<div style="background:#dcfce7;color:#15803d;padding:1rem;border-radius:var(--radius);margin-bottom:1rem;">✅ ' + data.message + '</div>';
      setTimeout(() => window.location.href = 'login.html', 2000);
    }).catch(err => {
      el.innerHTML = '<div style="background:#fee2e2;color:#991b1b;padding:1rem;border-radius:var(--radius);margin-bottom:1rem;">❌ ' + err.message + '</div>';
    });
  }
</script>
</body>
</html>
