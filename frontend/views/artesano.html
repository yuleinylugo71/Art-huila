<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Perfil del Artesano — Art Huila</title>
  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    .artisan-header {
      background: var(--color-bg1);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 3rem 2rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    .artisan-avatar-lg {
      font-size: 5rem;
      background: var(--color-bg2);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      border: 4px solid var(--color-bg1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .artisan-name {
      font-family: 'Crimson Pro', serif;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .gallery-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: var(--radius);
      transition: transform 0.3s;
    }
    .gallery-img:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/index.html" class="navbar-brand">Art <span>Huila</span></a>
  <ul class="navbar-nav">
    <li><a href="/catalogo.html">Catálogo</a></li>
    <li><a href="/carrito.html" id="nav-cart-count" style="font-weight: bold; color: var(--color-primary);">Carrito (0)</a></li>
    <li id="nav-auth"></li>
  </ul>
</nav>

<div class="container section">
  <div id="artisan-container">
    <div class="spinner"></div>
  </div>

  <h2 style="font-family:'Crimson Pro',serif;font-size:2rem;margin:3rem 0 1.5rem;">Obras de este artesano</h2>
  <div id="artisan-products" class="grid grid-4">
    <div class="spinner"></div>
  </div>
</div>

<footer>
  <div class="brand">Art <span>Huila</span></div>
  <p style="font-size:0.85rem;margin-top:0.5rem;">© 2026 Art Huila</p>
</footer>

<script src="/js/api.js"></script>
<script src="/js/artesano.js"></script>
</body>
</html>
