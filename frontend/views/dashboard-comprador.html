<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — Art Huila</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/dashboard-comprador.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <a href="index.html" class="nav-back" title="Volver al inicio">←</a>
    <a href="index.html" class="navbar-brand">Art <span>Huila</span></a>
  </div>
  <ul class="navbar-nav">
    <li><a href="catalogo.html" data-i18n="nav.viewCatalog">Catálogo</a></li>
    <li><a href="carrito.html" style="font-weight:bold;color:var(--color-primary);"><i class="fa-solid fa-cart-shopping"></i> Carrito</a></li>
    <li><button class="btn btn-outline btn-sm" onclick="Auth.logout()" data-i18n="auth.logout">Cerrar sesión</button></li>
  </ul>
  <div class="lang-switcher">
    <button id="btn-lang-es" onclick="window.changeLanguage('es')">ES</button>
    <span>|</span>
    <button id="btn-lang-en" onclick="window.changeLanguage('en')">EN</button>
  </div>
</nav>

<div class="container section">
  <div class="buyer-layout">
    <aside class="buyer-sidebar">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div style="font-size:3rem;"><i class="fa-solid fa-user"></i></div>
        <h3 id="user-name" style="font-size:1.1rem;margin-top:0.5rem;">Cargando...</h3>
        <p id="user-email" style="font-size:0.8rem;color:var(--color-muted);"></p>
      </div>
      <ul class="sidebar-menu">
        <li><a href="#" class="active" onclick="showTab('orders')"><i class="fa-solid fa-box"></i> Mis Pedidos</a></li>
        <li><a href="#" onclick="showTab('profile')"><i class="fa-solid fa-user"></i> Mis Datos</a></li>
      </ul>
    </aside>

    <main>
      <div id="tab-orders">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom:1.5px solid var(--color-border); padding-bottom:0.75rem;">
          <h2 style="font-family:'Crimson Pro',serif; margin:0; font-size:1.6rem;">Historial de Pedidos</h2>
          <span style="font-size:0.75rem; color:#64748b; background:#f1f5f9; padding:0.25rem 0.75rem; border-radius:12px; font-weight:600;">Trazabilidad Completa Activa</span>
        </div>
        <div id="orders-container">
          <div class="spinner"></div>
        </div>
      </div>

      <div id="tab-profile" style="display:none;">
        <h2 style="font-family:'Crimson Pro',serif;margin-bottom:1.5rem;">Mis Datos</h2>
        <div class="card card-body" style="max-width:500px;">
          <form id="profile-form">
            <div class="form-group">
              <label class="form-label">Nombre Completo</label>
              <input type="text" id="edit-full-name" class="form-control" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="edit-email" class="form-control" disabled/>
              <small class="form-hint">El email no puede cambiarse.</small>
            </div>
            <div class="form-group">
              <label class="form-label">Nueva Contraseña</label>
              <input type="password" id="edit-password" class="form-control" placeholder="Dejar en blanco para mantener la actual"/>
            </div>
            <div style="margin-top:1.5rem;">
              <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Guardar Cambios</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>

<footer>
  <div class="brand">Art <span>Huila</span></div>
</footer>

<script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
<script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js"></script>
<script src="https://unpkg.com/i18next-browser-languagedetector/i18nextBrowserLanguageDetector.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/dashboard-comprador.js"></script>
</body>
</html>
