<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito de Compras — Art Huila</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/carrito.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <a href="catalogo.html" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--color-bg2);color:var(--color-text);text-decoration:none;font-size:1.1rem;transition:all 0.2s;border:1px solid var(--color-border);" title="Seguir comprando">←</a>
    <a href="index.html" class="navbar-brand">Art <span>Huila</span></a>
  </div>
  <ul class="navbar-nav">
    <li><a href="catalogo.html">Catálogo</a></li>
    <li><a href="carrito.html" id="nav-cart-count" style="font-weight:bold;color:var(--color-primary);"><i class="fa-solid fa-cart-shopping"></i> Carrito (0)</a></li>
  </ul>
  <div class="lang-switcher">
    <button id="btn-lang-es" onclick="window.changeLanguage('es')">ES</button>
    <span>|</span>
    <button id="btn-lang-en" onclick="window.changeLanguage('en')">EN</button>
  </div>
</nav>

<div class="container section">
  <h1 class="section-title">Tu Carrito de Compras</h1>
  
  <div id="cart-empty" style="display: none; text-align: center; padding: 4rem 0;">
    <h2>Tu carrito está vacío</h2>
    <p style="color: var(--color-muted); margin-bottom: 2rem;">Explora el catálogo para descubrir artesanías increíbles.</p>
    <a href="/catalogo.html" class="btn btn-primary">Ir al Catálogo</a>
  </div>

  <div id="cart-content" class="cart-grid" style="display: none;">
    <div class="cart-items" id="cart-items-container">
      <!-- Items renderizados dinámicamente -->
    </div>
    <div class="cart-summary">
      <h3 style="margin-bottom: 1rem; font-family: 'Crimson Pro', serif;">Resumen del pedido</h3>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="summary-subtotal">$0</span>
      </div>

      <div class="shipping-calculator" style="margin: 1rem 0; padding: 1rem; background: var(--color-bg2); border-radius: 8px; border: 1px solid var(--color-border);">
        <h4 style="margin-bottom: 0.5rem; font-size: 0.9rem;">Destino de Envío</h4>
        <select id="destination-city" style="width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-bg); color: var(--color-text);">
          <option value="">Selecciona tu ciudad...</option>
          <option value="Bogotá">Bogotá</option>
          <option value="Medellín">Medellín</option>
          <option value="Cali">Cali</option>
          <option value="Barranquilla">Barranquilla</option>
          <option value="Cartagena">Cartagena</option>
          <option value="Neiva">Neiva</option>
          <option value="Bucaramanga">Bucaramanga</option>
          <option value="Pereira">Pereira</option>
          <option value="Santa Marta">Santa Marta</option>
          <option value="Ibagué">Ibagué</option>
          <option value="Pitalito">Pitalito</option>
          <option value="Garzón">Garzón</option>
          <option value="La Plata">La Plata</option>
        </select>
        <button id="btn-quote-shipping" class="btn btn-secondary btn-block" style="font-size: 0.85rem; padding: 0.5rem; background: transparent; border: 1px solid var(--color-primary); color: var(--color-primary); border-radius: 6px; cursor: pointer; transition: all 0.2s;" onclick="calculateShipping()">Calcular Envío</button>
        <div id="shipping-result" style="margin-top: 0.75rem; font-size: 0.85rem; display: none;"></div>
      </div>

      <div class="summary-row">
        <span>Envío</span>
        <span id="summary-shipping">$0</span>
      </div>
      <div class="summary-row summary-total">
        <span>Total</span>
        <span id="summary-total">$0</span>
      </div>
      <button id="btn-checkout" class="btn btn-primary btn-block" style="margin-top: 1rem;">Proceder al Pago</button>
    </div>
  </div>
</div>

<footer>
  <div class="brand">Art <span>Huila</span></div>
</footer>

<script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
<script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js"></script>
<script src="https://unpkg.com/i18next-browser-languagedetector/i18nextBrowserLanguageDetector.min.js"></script>
<script src="https://checkout.epayco.co/checkout.js"></script>
<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/carrito.js"></script>
</body>
</html>
