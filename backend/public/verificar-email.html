<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="verifyEmail.title">Verificar Email — Art Huila</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/verificar-email.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="flex items-center justify-center min-vh-100">

<nav style="position: absolute; top: 1.5rem; right: 2rem; z-index: 10;">
  <div class="lang-switcher">
    <button id="btn-lang-es" onclick="window.changeLanguage('es')">ES</button>
    <span>|</span>
    <button id="btn-lang-en" onclick="window.changeLanguage('en')">EN</button>
  </div>
</nav>

<div class="verify-container">
  <div class="verify-icon"><i class="fa-solid fa-envelope"></i></div>
  <h1 class="verify-title" data-i18n="verifyEmail.heading">Revisa tu correo</h1>
  <p class="verify-text" data-i18n="verifyEmail.text">Hemos enviado un enlace de verificación a tu correo electrónico. Haz clic en él para activar tu cuenta. El enlace expira en <strong>48 horas</strong>.</p>
  <div id="verify-status"></div>
  <a href="/login.html" class="btn btn-outline" data-i18n="verifyEmail.goToLogin">Ir al inicio de sesión</a>
</div>

<script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
<script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script>
  // Auto-verify if token in URL
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (token) {
    const el = document.getElementById('verify-status');
    el.innerHTML = '<div class="spinner"></div>';
    apiFetch('/auth/verificar-email?token=' + token).then(data => {
      el.innerHTML = '<div style="background:#dcfce7;color:#15803d;padding:1rem;border-radius:var(--radius);margin-bottom:1rem;"><i class="fa-solid fa-check"></i> ' + data.message + '</div>';
      setTimeout(() => window.location.href = 'login.html', 2000);
    }).catch(err => {
      el.innerHTML = '<div style="background:#fee2e2;color:#991b1b;padding:1rem;border-radius:var(--radius);margin-bottom:1rem;"><i class="fa-solid fa-xmark"></i> ' + err.message + '</div>';
    });
  }
</script>
</body>
</html>
