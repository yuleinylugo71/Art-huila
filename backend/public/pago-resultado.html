<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Resultado de Pago — Art Huila</title>
  <link rel="stylesheet" href="/css/base.css?v=18">
  <link rel="stylesheet" href="/css/pago-exitoso.css">
  <link rel="stylesheet" href="/css/pago-fallido.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Additional custom styling for loading spinner */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(200, 75, 17, 0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: #C84B11;
      animation: spin 1s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<nav style="position: absolute; top: 1.5rem; right: 2rem; z-index: 10;">
  <div class="lang-switcher">
    <button id="btn-lang-es" onclick="window.changeLanguage('es')">ES</button>
    <span>|</span>
    <button id="btn-lang-en" onclick="window.changeLanguage('en')">EN</button>
  </div>
</nav>

<div id="resultado-container">
  <div class="loading-container">
    <div class="spinner"></div>
    <h3 style="font-family: var(--font-body); font-weight:600; color:var(--color-text);" data-i18n="payment.processingLabel">Verificando estado del pago...</h3>
  </div>
</div>

<script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
<script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js"></script>
<script src="https://unpkg.com/i18next-browser-languagedetector/i18nextBrowserLanguageDetector.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/pago-resultado.js"></script>
</body>
</html>
